<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        section{
            height: 600px;
            width: 600px;
            border: solid;
            position: static;
            background-color: #fabedc;
            
           
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 50px;

        }
        
        div:nth-child(1){
            background-color: aqua;
            height: 80px;
            width: 80px;
            border: solid;
            position: fixed;
            top: 0px;
            left: 0px;
            

        }
        div:nth-child(2){
            background-color: #74f392;
            height: 80px;
            width: 80px;
            border: solid;
            position: fixed;
            right: 0px;
            top: 0px;
            
            

        }
        div:nth-child(3){
            background-color: #f04290;
            height: 80px;
            width: 80px;
            border: solid;
            position: fixed;
            top: 50%;
            left: 3%;
            translate: -50% ;
        }
        div:nth-child(4){
            background-color: #f649f3;
            height: 80px;
            width: 80px;
            border: solid;
            bottom: 0px;
            position: fixed;
            top: 50%;
            right: -3%;
            translate: -50% -0% ;
        }
        div:nth-child(5){
            background-color: #f68349;
            height: 80px;
            width: 80px;
            border: solid;
            position: fixed;
            bottom: 0px;
            left: 0px;
        }
        div:nth-child(6){
            background-color: #f6df49;
            height: 80px;
            width: 80px;
            border: solid;
            position: fixed;
            bottom: 0px;
            right: 0px;
        }
        div:nth-child(7){
            background-color: #f04242;
            height: 80px;
            width: 80px;
            border: solid;
            position: fixed;
            top: 0%;
            left: 42%;
            translate:-50;
        }
         div:nth-child(8){
            background-color: #a5f042;
            height: 80px;
            width: 80px;
            border: solid;
            position: fixed;
            top: 50%;
            left: 45%;
            translate: -50% -50%;
            
         }
         div:nth-child(9){
            background-color: #42f0c4;
            height: 80px;
            width: 80px;
            border: solid;
            position: fixed;
            bottom: 0%;
            left: 45%;
            translate: -50%;
            
         }
    </style>
</head>
<body>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
    </section>
    
</body>
</html>
