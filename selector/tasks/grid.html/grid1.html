<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
         body{
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
         }
        section{
            height: 500px;
            width: 800px;
            border: solid;
            display: grid;
            grid-template-columns: repeat(3,auto);
            grid-template-rows: repeat(3,auto);
            gap: 10px;
            
         }
         div:nth-child(1){
            background-color: green;
             grid-row-start:1 ;
             grid-row-end: 4;
             
         }
         div:nth-child(2){
            background-color: green;
            /* grid-row-start: 3;
            grid-row-end: 6;
            grid-column-start: 3;
            grid-column-end: 6; */
            grid-column-start: 2;
            grid-column-end: 4;

         }
         div:nth-child(3){
            background-color: red;
            /* grid-column-start: 7;
            grid-column-end: 9; */
         }
         div:nth-child(4){
            background-color:orange;
         }
         div:nth-child(5){
            background-color: #f70404;
            

         } 
         div:nth-child(6){
            background-color: green;
            grid-column-start: 4;
            grid-column-end: 5;
            grid-row-start: 2;
            grid-row-end: 4;

         }
         div:nth-child(7){
            background-color: red;
         }
         div:nth-child(8){
            background-color: orange;
         }

         
      
    </style>

</head>
<body>
 
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div> 
        <div>6</div>
        <div>7</div> 
        <div>8</div> 
        <!-- <div>9</div>  -->
        
        
        
    </section>
</body>
</html>
