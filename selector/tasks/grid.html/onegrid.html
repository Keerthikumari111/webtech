<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
    }
    section{
        height: 500px;
        width: 800px;
        border: solid;
        display: grid;
        grid-template-rows: repeat(4,auto);
        grid-template-columns: repeat(4,auto);
        gap: 5px;
    }
    div{
        text-align: center;
        text-indent: 20px;
       }
    div:nth-child(1){
        background-color: purple;
        grid-column-start: 1;
        grid-column-end: 5;
    }
    div:nth-child(2){
        background-color: blueviolet;
        grid-row-start: 2;
        grid-row-end: 4;
    }
    div:nth-child(3){
        background-color: #a06afd;
        
    }
    div:nth-child(4){
        background-color: #57e3f0;
        grid-column-start: 3;
        grid-column-end: 5;
        
    }
    div:nth-child(5){
        background-color: #c265de;
        grid-column-start: 2;
        grid-column-end: 5;
    }
    div:nth-child(6){
        background-color: purple;
        grid-column-start: 1;
        grid-column-end: 4;
    }
    div:nth-child(7){
        background-color: blueviolet;
        
    }
    div:nth-child(8){
        background-color: #a06afd;
        grid-column-start: 1;
        grid-column-end: 5;
    }
    
    </style>
</head>
<body>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
    </section>
    
</body>
</html>
