<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px;
        }
        div:nth-child(1){
            height: 250px;
            width: 250px;
            border: solid;
            background-color: #000000;
            transition-property: all;
            transition-duration: 5s;
            transition-delay: 2s;
            transition-timing-function: linear;
        }
        div:nth-child(2){
            height: 250px;
            width: 250px;
            border: solid;
            background-color: #000000;
            transition-property: all;
            transition-duration: 5s;
            transition-delay: 2s;
            transition-timing-function: linear;
        }
        
        div:hover:nth-child(1){
            background-color: palevioletred;
            height: 300px;
            width: 300px;
            border-radius: 50%;
        }
        div:hover:nth-child(2){
            background-color: #1c40d1;
            height: 300px;
            width: 300px;
            border-radius: 50%;
        }

    </style>
</head>
<body>/
    <section>
        <div></div>
        <div></div>
    </section>
    
    
</body>
</html>
