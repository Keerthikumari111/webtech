<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            
        }
        
        body{
            height: 100vh;
            width: 100vw;
            
            
        }
        section{
            height:100vh;
            width: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0px 10px;
        }
        div{
            height: 50px;
            width: 50px;
            border: solid;
            transition: all 3s 1s linear;
        }
        #one:hover{
            background-color: red;
        }
        #two:hover{
           border-radius: 50%;
        }
        #three:hover{
           height: 400px;
         }
        #four:hover{
           width: 400px;
        }

    </style>
</head>
<body>
    <section>
        <div>

        </div>
        <div>

        </div>
        <div>

        </div>
        <div>

        </div>
    </section>
</body>
</html>
