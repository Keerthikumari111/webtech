<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        section{
            height: 500px;
            width: 700px;
            border: solid ;
            display: grid;
            grid-template-columns: repeat(4,auto);
            grid-template-rows: repeat(4,auto);
            gap: 4px;
        }
        div{
            text-align: center;
            font-size: larger;
            text-indent: 20px;
            
        }
        div:nth-child(1){
            background-color: #7cf6fc;
            grid-column-start: 1;
            grid-column-end:5 ;
        }
        div:nth-child(2){
            background-color: #1cf123;
            grid-column-start: 2;
            

        }
        div:nth-child(3){
            background-color: #fa51f5;
        
        }
        div:nth-child(4){
            background-color: orange;
             grid-column-start: 2;
            grid-column-end:3 ; 
        }
        div:nth-child(5){
            background-color: orange;
            /* grid-column-start: ;
            grid-column-end:5 ;  */
        }
        div:nth-child(6){
            background-color: #7cf6fc;
            grid-column-start: 1;
            grid-column-end:5 ;
        }
    </style>
</head>
<body>
    <section>
        <div>.header</div>
        <div>.main-content</div>
        <div>.sidebar</div>
        <div>.twin</div>
        <div>.twin</div>
        <div>.footer</div>
        
    </section>
</body>
</html>
