<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px;

        }
        section{
            height: 500px;
            width: 400px;
            border:4px solid;
            display: grid;
            grid-template-columns: repeat(4,auto);
            grid-template-rows: repeat(4,auto);
            gap: 2px;

        }
        div{
            text-align: center;
            font-size: larger;
        }
        div:nth-child(1){
            background-color: black;
            grid-column-start: 1;
            grid-column-end: 5;
        }
        div:nth-child(2){
            background-color: orangered;
            grid-column-start: 1;
            grid-column-end: 3;
        }
        div:nth-child(3){
            background-color: gray;
            
        }
        div:nth-child(4){
            background-color: gray;
            
        }
        div:nth-child(5){
            background-color: #3c3c3c;
            
        }
        div:nth-child(6){
            background-color: #3c3c3c;
            
        }
        div:nth-child(7){
            background-color: #3c3c3c;
            
        }
        div:nth-child(8){
            background-color: gray;
            
        }
        div:nth-child(9){
            background-color: #3c3c3c;
            
        }
        div:nth-child(10){
            background-color: #3c3c3c;
            
        }
        div:nth-child(11){
            background-color: #3c3c3c;
            
        }
        div:nth-child(12){
            background-color: gray;
            
        }
        div:nth-child(13){
            background-color: #3c3c3c;
            
        }
        div:nth-child(14){
            background-color: #3c3c3c;
            
        }
        
        
        div:nth-child(15){
            background-color: #3c3c3c;
            
        }
        div:nth-child(16){
            background-color: #6095f6;
             
        }
        div:nth-child(17){
            background-color: #3c3c3c;
            grid-column-start: 1;
            grid-column-end: 3;
            
        }
        div:nth-child(18){
            background-color: #3c3c3c;
            
        }
    </style>
</head>
<body>
    <section>
        <div></div>
        <div>AC</div>
        <div>/</div>
        <div>x</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>-</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>+</div>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>=</div>
        <div>0</div>
        <div>.</div>
    </section>
    
</body>
</html>
